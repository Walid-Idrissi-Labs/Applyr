<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applyr - Job Application Tracker</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="css/style.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'Liberation Mono', 'Courier New', 'monospace'],
          },
        },
      },
    }
  </script>
</head>
<body class="font-mono text-[13px] text-[#111] dark:text-gray-100 bg-gray-100 dark:bg-[#0a0a0a] overflow-hidden transition-colors duration-300">

  <div id="root" class="h-screen w-screen"></div>

  <!-- Load Scripts -->
  <script src="js/state.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/applications.js"></script>
  <script src="js/resumes.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
